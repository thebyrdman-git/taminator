---
# Ensure a Python venv exists with tam-rfe runtime deps (rich, click, etc.).
# Idempotent: creates venv once, pip install only when requirements change.
# Used so the packaged app can run tam-rfe without relying on system Python.

- name: Ensure python-bundle directory exists
  file:
    path: "{{ python_bundle_dir }}"
    state: directory
    mode: "0755"

- name: Check if venv already exists
  stat:
    path: "{{ python_bundle_dir }}/bin/python"
  register: venv_bin_python
  ignore_errors: true

- name: Check for Linux (venv has bin/python3 on some)
  stat:
    path: "{{ python_bundle_dir }}/bin/python3"
  register: venv_bin_python3
  ignore_errors: true
  when: venv_bin_python.stat.exists is not defined or not venv_bin_python.stat.exists

# --copies: embed interpreter binaries instead of symlinking to /usr/bin/python3.*
# so the packaged AppImage works on machines where that path/version differs.
- name: Create Python venv (idempotent)
  command: "{{ python_bundle_python }} -m venv --copies {{ python_bundle_dir }}"
  args:
    creates: "{{ python_bundle_dir }}/pyvenv.cfg"
  when: (venv_bin_python.stat.exists is not defined or not venv_bin_python.stat.exists) and (venv_bin_python3.stat.exists is not defined or not venv_bin_python3.stat.exists)

- name: Stat venv pyvenv.cfg (so we know venv is ready)
  stat:
    path: "{{ python_bundle_dir }}/pyvenv.cfg"
  register: venv_cfg

- name: Upgrade pip in venv (idempotent)
  command: "{{ python_bundle_dir }}/bin/python -m pip install --upgrade pip"
  when: venv_cfg.stat.exists | default(false)

- name: Ensure requirements file exists
  assert:
    that: requirements_file is defined and requirements_file | length > 0
    fail_msg: "requirements_file (e.g. requirements-runtime.txt) must be set for taminator_python_bundle."

# Use the venv's pip via command so the *controller* Python does not need the `packaging`
# library (Ansible's pip module imports packaging on the machine running ansible-playbook).
- name: Install runtime requirements into venv
  command: "{{ python_bundle_dir }}/bin/python -m pip install -r {{ requirements_file }}"

# Venv does not ship the full stdlib; it references sys.base_prefix (e.g. /usr/lib/python3.x).
# AppImage users on other distros may lack that path/version — copy stdlib into the bundle.
- name: Embed base Python standard library into python-bundle (Linux, macOS)
  when: ansible_system in ['Linux', 'Darwin']
  shell: |
    set -e
    BUNDLE="{{ python_bundle_dir }}"
    PY="$BUNDLE/bin/python"
    VER=$("$PY" -c "import sys; print('%d.%d' % sys.version_info[:2])")
    SRC=$("$PY" -c "import sys, os; v='%d.%d' % sys.version_info[:2]; print(os.path.join(sys.base_prefix, 'lib', 'python'+v))")
    DST="$BUNDLE/lib/python$VER"
    mkdir -p "$DST"
    rsync -a --exclude site-packages "$SRC/" "$DST/"
    "$PY" -c "import encodings; print('embedded stdlib ok')"
  args:
    executable: /bin/bash

# venv --copies still leaves the interpreter dynamically linked to libpython on the build host.
# Ship those .so files and set LD_LIBRARY_PATH at runtime (see taminator/gui/main.js).
- name: Embed libpython shared libraries for Linux (ldd → python-bundle/lib)
  when: ansible_system == 'Linux'
  shell: |
    set -e
    BUNDLE="{{ python_bundle_dir }}"
    PY="$BUNDLE/bin/python"
    LIBDIR="$BUNDLE/lib"
    mkdir -p "$LIBDIR"
    copied=0
    while IFS= read -r line; do
      so=$(echo "$line" | sed -n 's/.*libpython[^ ]* => \(.*\) (.*/\1/p')
      if [ -z "$so" ]; then
        so=$(echo "$line" | awk '{for(i=1;i<=NF;i++) if($i=="=>"){print $(i+1); exit}}')
      fi
      if [ -z "$so" ] || [ "$so" = "not" ]; then continue; fi
      case "$so" in
        /*)
          if [ -f "$so" ]; then
            base=$(basename "$so")
            cp -a "$so" "$LIBDIR/$base"
            copied=$((copied + 1))
          fi
          ;;
      esac
    done < <(ldd "$PY" 2>/dev/null | grep libpython || true)
    if [ "$copied" -eq 0 ]; then
      for d in /usr/lib/x86_64-linux-gnu /usr/lib/aarch64-linux-gnu /usr/lib64 /usr/lib; do
        for f in "$d"/libpython*.so*; do
          [ -f "$f" ] || continue
          cp -a "$f" "$LIBDIR/"
          copied=$((copied + 1))
        done
      done
    fi
    if [ "$copied" -eq 0 ]; then
      echo "ERROR: no libpython copied for $PY; AppImage will not run off-host" >&2
      ldd "$PY" || true
      exit 1
    fi
    export LD_LIBRARY_PATH="$LIBDIR${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"
    "$PY" -c "import encodings, sys; print('bundle libpython ok', sys.version.split()[0])"
  args:
    executable: /bin/bash
