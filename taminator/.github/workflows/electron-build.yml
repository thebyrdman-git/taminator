---
# GitHub Actions: Build and release Taminator
# Repo: https://github.com/thebyrdman-git/taminator
# Layout: repo root must contain taminator/ (and scripts/ for verify). Paths: taminator/gui/, taminator/gui/build/icon.png, etc.
# Trigger: push tag v*.*.* (e.g. v2.0.1) or Run workflow. On tag, creates a GitHub Release with Linux x64/macOS/Windows artifacts.
# Linux ARM64 AppImage: build locally with npm run build:linux:arm64:appimage and attach to the release if needed.
name: Electron Build & Release

on:
  push:
    tags:
      - 'v*.*.*'  # Triggers on version tags like v1.9.5
  workflow_dispatch:  # Manual trigger for testing

permissions:
  contents: write  # Required for creating releases

jobs:
  verify:
    name: Verify (lint + icon)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify build icon exists
        run: |
          if [ ! -f taminator/gui/build/icon.png ]; then
            echo "::error::Missing taminator/gui/build/icon.png"
            exit 1
          fi
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install GUI dependencies
        working-directory: taminator/gui
        run: npm ci
      - name: Lint GUI
        working-directory: taminator/gui
        run: npm run lint
      - name: Run full verify script
        run: bash scripts/verify.sh --no-python

  build:
    name: Build ${{ matrix.os }}
    needs: verify
    runs-on: ${{ matrix.runner }}
    
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux builds
          - os: Linux
            runner: ubuntu-latest
            build_target: linux
            artifact_pattern: 'taminator/gui/dist/*.AppImage'
          
          # Windows builds
          - os: Windows
            runner: windows-latest
            build_target: win
            artifact_pattern: 'taminator/gui/dist/*.exe'
          
          # macOS builds (Universal - Intel + Apple Silicon)
          - os: macOS
            runner: macos-latest
            build_target: mac
            artifact_pattern: 'taminator/gui/dist/*.dmg'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify build icon exists
        run: |
          if [ ! -f taminator/gui/build/icon.png ]; then
            echo "::error::Missing taminator/gui/build/icon.png — add a 512x512 PNG and commit it."
            exit 1
          fi
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Node dependencies
        working-directory: taminator/gui
        run: npm ci
      
      - name: Build Electron app (${{ matrix.os }})
        working-directory: taminator/gui
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLEID: ${{ secrets.APPLEID }}
          APPLEIDPASS: ${{ secrets.APPLEIDPASS }}
        run: |
          npx electron-builder --${{ matrix.build_target }} --publish never
      
      - name: List dist directory (debug)
        working-directory: taminator/gui
        shell: bash
        run: ls -la dist/
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: taminator-${{ matrix.os }}-${{ github.ref_name }}
          path: ${{ matrix.artifact_pattern }}
          retention-days: 30

  release:
    name: Create Release
    needs: [build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
      
      - name: List artifacts (debug)
        run: |
          echo "Artifacts downloaded:"
          find artifacts/ -type f
      
      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"
      
      - name: Read release notes
        id: release_notes
        run: |
          if [ -f "v${{ steps.version.outputs.version }}-release-notes.md" ]; then
            echo "notes_file=v${{ steps.version.outputs.version }}-release-notes.md" >> $GITHUB_OUTPUT
          else
            echo "notes_file=" >> $GITHUB_OUTPUT
          fi
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: Taminator v${{ steps.version.outputs.version }}
          body_path: ${{ steps.release_notes.outputs.notes_file }}
          draft: false
          prerelease: false
          files: |
            artifacts/**/*.AppImage
            artifacts/**/*.exe
            artifacts/**/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Release Summary
        run: |
          echo "✅ Release created successfully!"
          echo "🔗 https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}"
          echo ""
          echo "📦 Artifacts:"
          find artifacts/ -type f -exec basename {} \;
