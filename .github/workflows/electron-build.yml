---
name: Electron Build & Release

on:
  push:
    tags:
      - 'v*.*.*'  # Triggers on version tags like v1.9.5
  workflow_dispatch:  # Manual trigger: choose Linux only or all platforms
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'linux'
        type: choice
        options:
          - linux
          - all

permissions:
  contents: write  # Required for creating releases

jobs:
  # Linux x64: always run on tag; on manual run, always include Linux so we get 2 jobs when platform=linux.
  # Use ubuntu-20.04 (glibc 2.31) for the python-bundle: libpython from ubuntu-latest links to GLIBC_2.35+
  # and fails on Rocky/RHEL 9 (glibc 2.34). When the 20.04 runner is removed, use a 20.04/22.04 container
  # for the Ansible bundle step only, then build the AppImage on ubuntu-latest.
  build-linux:
    name: Build Linux
    runs-on: ubuntu-20.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Ensure build icon
        shell: bash
        run: |
          if [ ! -f taminator/gui/build/icon.png ]; then
            echo "::error::Missing taminator/gui/build/icon.png — add a 512x512 PNG and commit it."
            exit 1
          fi
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: taminator/gui/package-lock.json
      - name: Cache Electron and electron-builder
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
            taminator/gui/node_modules/electron
          key: electron-Linux-${{ hashFiles('taminator/gui/package-lock.json') }}
          restore-keys: |
            electron-Linux-
      - name: Install Node dependencies
        working-directory: taminator/gui
        env:
          npm_config_fetch_retries: 5
          npm_config_fetch_timeout: 600000
          npm_config_fetch_retry_mintimeout: 60000
          ELECTRON_GET_USE_PROXY: 'false'
        run: |
          for i in 1 2 3; do
            echo "Attempt $i of 3..."
            if npm ci; then
              echo "npm ci succeeded"
              exit 0
            fi
            echo "Attempt $i failed."
            if [ "$i" -lt 3 ]; then echo "Retrying in 30s..."; sleep 30; fi
          done
          echo "::error::npm ci failed after 3 attempts"
          exit 1
      - name: Set up Python (for Ansible + venv)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Prepare Python bundle (venv with rich, etc.) for packaged app
        run: |
          python -m pip install --upgrade pip
          python -m pip install ansible
          ansible-playbook -i taminator/taminator/ansible/inventory-build.yml \
            taminator/taminator/ansible/playbooks/prepare-python-bundle.yml
      - name: Verify Python bundle (must import rich before electron-pack)
        run: |
          PY=taminator/taminator/python-bundle/bin/python
          LIB=taminator/taminator/python-bundle/lib
          test -x "$PY" || { echo "::error::Expected $PY — prepare-python-bundle did not create the venv"; exit 1; }
          shopt -s nullglob
          libs=( "$LIB"/libpython*.so* )
          if [ ${#libs[@]} -eq 0 ]; then
            echo "::error::No libpython under $LIB — Rocky and other hosts without CI Python libs will fail"
            exit 1
          fi
          "$PY" -c "import rich, click" || { echo "::error::venv missing runtime deps (rich/click)"; exit 1; }
          env LD_LIBRARY_PATH="$LIB" "$PY" -c "import encodings, rich" || { echo "::error::Bundle must run with only LD_LIBRARY_PATH=$LIB (libpython embed)"; exit 1; }
          echo "Python bundle OK: $($PY -c 'import rich; print(rich.__file__)')"
      - name: Build Electron app (Linux)
        working-directory: taminator/gui
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --linux --publish never
      - name: List dist directory (debug)
        working-directory: taminator/gui
        shell: bash
        run: ls -la dist/
      - name: Add no-FUSE launcher script (run without installing fuse)
        working-directory: taminator/gui/dist
        run: |
          APPIMAGE=$(ls -1 *.AppImage 2>/dev/null | head -1)
          test -n "$APPIMAGE" || { echo "::error::No AppImage found"; exit 1; }
          cat > run-taminator-no-fuse.sh << 'LAUNCHER'
          #!/bin/bash
          # Run Taminator AppImage without requiring FUSE (extracts to /tmp and runs).
          # Use this if you have not installed fuse or the AppImage fails to mount.
          SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          APPIMAGE="${SCRIPT_DIR}/TAMINATOR_APPIMAGE_PLACEHOLDER"
          exec "$APPIMAGE" --appimage-extract-and-run
          LAUNCHER
          sed -i "s/TAMINATOR_APPIMAGE_PLACEHOLDER/$APPIMAGE/" run-taminator-no-fuse.sh
          chmod +x run-taminator-no-fuse.sh
          ls -la run-taminator-no-fuse.sh "$APPIMAGE"
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: taminator-Linux-${{ github.ref_name }}
          path: taminator/gui/dist/
          retention-days: 30

  # Windows + macOS: only on tag push or when manual platform=all.
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.runner }}
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.platform == 'all')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: Windows
            runner: windows-latest
            build_target: win
            artifact_pattern: taminator/gui/dist/*.exe
          - os: macOS
            runner: macos-latest
            build_target: mac
            artifact_pattern: taminator/gui/dist/*.dmg
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Ensure build icon
        shell: bash
        run: |
          if [ ! -f taminator/gui/build/icon.png ]; then
            echo "::error::Missing taminator/gui/build/icon.png — add a 512x512 PNG and commit it."
            exit 1
          fi
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: taminator/gui/package-lock.json
      - name: Cache Electron and electron-builder
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
            taminator/gui/node_modules/electron
          key: electron-${{ matrix.os }}-${{ hashFiles('taminator/gui/package-lock.json') }}
          restore-keys: |
            electron-${{ matrix.os }}-
      - name: Install Node dependencies
        working-directory: taminator/gui
        env:
          npm_config_fetch_retries: 5
          npm_config_fetch_timeout: 600000
          npm_config_fetch_retry_mintimeout: 60000
          ELECTRON_GET_USE_PROXY: 'false'
        run: |
          for i in 1 2 3; do
            echo "Attempt $i of 3..."
            if npm ci; then
              echo "npm ci succeeded"
              exit 0
            fi
            echo "Attempt $i failed."
            if [ "$i" -lt 3 ]; then echo "Retrying in 30s..."; sleep 30; fi
          done
          echo "::error::npm ci failed after 3 attempts"
          exit 1
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Prepare Python bundle (macOS — Ansible, same as Linux)
        if: runner.os == 'macOS'
        run: |
          python -m pip install --upgrade pip
          python -m pip install ansible
          ansible-playbook -i taminator/taminator/ansible/inventory-build.yml \
            taminator/taminator/ansible/playbooks/prepare-python-bundle.yml
      - name: Prepare Python bundle (Windows — venv; Ansible role is Unix paths only)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python -m venv --copies taminator/taminator/python-bundle
          ./taminator/taminator/python-bundle/Scripts/python.exe -m pip install --upgrade pip
          ./taminator/taminator/python-bundle/Scripts/pip.exe install -r taminator/taminator/requirements-runtime.txt
      - name: Verify Python bundle (macOS)
        if: runner.os == 'macOS'
        run: |
          PY=taminator/taminator/python-bundle/bin/python
          test -x "$PY" || { echo "::error::Missing $PY"; exit 1; }
          "$PY" -c "import rich, click"
      - name: Verify Python bundle (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $py = "taminator/taminator/python-bundle/Scripts/python.exe"
          if (-not (Test-Path $py)) { throw "Missing $py" }
          & $py -c "import rich, click"
      - name: Build Electron app (${{ matrix.os }})
        working-directory: taminator/gui
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --${{ matrix.build_target }} --publish never
      - name: List dist directory (debug)
        working-directory: taminator/gui
        shell: bash
        run: ls -la dist/
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: taminator-${{ matrix.os }}-${{ github.ref_name }}
          path: ${{ matrix.artifact_pattern }}
          retention-days: 30

  build-linux-arm64:
    name: Build Linux ARM64 (AppImage)
    runs-on: ubuntu-24.04
    continue-on-error: true  # Do not block release if ARM64 build fails
    steps:
      - uses: actions/checkout@v4
      - name: Ensure build icon
        run: |
          if [ ! -f taminator/gui/build/icon.png ]; then
            echo "::error::Missing taminator/gui/build/icon.png — add a 512x512 PNG and commit it."
            exit 1
          fi
      - uses: uraimo/run-on-arch-action@v3
        name: Build AppImage on aarch64
        id: build
        with:
          arch: aarch64
          # Jammy has python3.12 + venv + dev for aarch64 in main/universe. Focal + deadsnakes has no arm64 3.12 packages.
          distro: ubuntu22.04
          setup: |
            mkdir -p "${PWD}/arm64-artifacts"
          dockerRunArgs: |
            --volume "${PWD}:/workspace"
            --volume "${PWD}/arm64-artifacts:/artifacts"
          install: |
            apt-get update -qq
            apt-get install -qq -y curl ca-certificates rsync software-properties-common
            # Minimal run-on-arch images often omit universe; python3.12 is in universe on Jammy (all arches).
            add-apt-repository -y universe
            apt-get update -qq
            apt-get install -qq -y python3.12 python3.12-venv python3.12-dev python3-pip
            curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
            apt-get install -qq -y nodejs
            apt-get install -qq -y libgtk-3-0 libnotify4 libnss3 libxss1 libasound2 libxtst6 libgbm1
          run: |
            set -e
            # Match x64 CI: Python 3.12 venv + embedded stdlib + libpython (same as prepare-python-bundle / Rocky).
            python3.12 -m venv --copies /workspace/taminator/taminator/python-bundle
            /workspace/taminator/taminator/python-bundle/bin/pip install --upgrade pip
            /workspace/taminator/taminator/python-bundle/bin/pip install -r /workspace/taminator/taminator/requirements-runtime.txt
            BUNDLE=/workspace/taminator/taminator/python-bundle
            PY="$BUNDLE/bin/python"
            VER=$("$PY" -c "import sys; print('%d.%d' % sys.version_info[:2])")
            SRC=$("$PY" -c "import sys, os; v='%d.%d' % sys.version_info[:2]; print(os.path.join(sys.base_prefix, 'lib', 'python'+v))")
            mkdir -p "$BUNDLE/lib/python$VER"
            rsync -a --exclude site-packages "$SRC/" "$BUNDLE/lib/python$VER/"
            mkdir -p "$BUNDLE/lib"
            copied=0
            while IFS= read -r line; do
              so=$(echo "$line" | sed -n 's/.*libpython[^ ]* => \(.*\) (.*/\1/p')
              if [ -z "$so" ]; then
                so=$(echo "$line" | awk '{for(i=1;i<=NF;i++) if($i=="=>"){print $(i+1); exit}}')
              fi
              if [ -z "$so" ] || [ "$so" = "not" ]; then continue; fi
              case "$so" in /*)
                if [ -f "$so" ]; then cp -a "$so" "$BUNDLE/lib/$(basename "$so")"; copied=$((copied + 1)); fi
                ;;
              esac
            done < <(ldd "$PY" 2>/dev/null | grep libpython || true)
            if [ "$copied" -eq 0 ]; then
              for d in /usr/lib/aarch64-linux-gnu /usr/lib64 /usr/lib; do
                for f in "$d"/libpython*.so*; do
                  [ -f "$f" ] || continue
                  cp -a "$f" "$BUNDLE/lib/"
                  copied=$((copied + 1))
                done
              done
            fi
            [ "$copied" -gt 0 ] || { echo "::error::No libpython copied; check ldd output for $PY"; ldd "$PY" || true; exit 1; }
            export LD_LIBRARY_PATH="$BUNDLE/lib${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"
            "$PY" -c "import encodings; import rich, click" || { echo "::error::ARM64 venv stdlib or deps"; exit 1; }
            cd /workspace/taminator/gui
            npm config set fetch-retries 5
            npm config set fetch-timeout 300000
            npm config set fetch-retry-mintimeout 20000
            npm ci
            npx electron-builder --linux AppImage --arm64 --publish never
            cp -v dist/*.AppImage /artifacts/ 2>/dev/null || true
            APPIMAGE=$(ls -1 /artifacts/*.AppImage 2>/dev/null | head -1)
            test -n "$APPIMAGE" || { echo "::error::No AppImage produced"; exit 1; }
            BASENAME=$(basename "$APPIMAGE")
            cat > /artifacts/run-taminator-no-fuse.sh << LAUNCHER
            #!/bin/bash
            # Run Taminator AppImage without requiring FUSE (extracts to /tmp and runs).
            SCRIPT_DIR="\$(cd "\$(dirname "\${BASH_SOURCE[0]}")" && pwd)"
            exec "\$SCRIPT_DIR/$BASENAME" --appimage-extract-and-run
            LAUNCHER
            chmod +x /artifacts/run-taminator-no-fuse.sh
            ls -la /artifacts/
      - name: Upload Linux ARM64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: taminator-Linux-arm64-${{ github.ref_name }}
          path: arm64-artifacts/
          retention-days: 30
        if: success()  # Only upload if build step produced an AppImage
  
  release:
    name: Create Release
    needs: [build-linux, build, build-linux-arm64]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
      
      - name: List artifacts (debug)
        run: |
          echo "Artifacts downloaded:"
          find artifacts/ -type f
      
      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"
      
      - name: Read release notes
        id: release_notes
        run: |
          if [ -f "v${{ steps.version.outputs.version }}-release-notes.md" ]; then
            echo "notes_file=v${{ steps.version.outputs.version }}-release-notes.md" >> $GITHUB_OUTPUT
          else
            echo "notes_file=" >> $GITHUB_OUTPUT
          fi
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: Taminator v${{ steps.version.outputs.version }}
          body_path: ${{ steps.release_notes.outputs.notes_file }}
          draft: false
          prerelease: false
          files: |
            artifacts/**/*.AppImage
            artifacts/**/*.exe
            artifacts/**/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: UI content hash (same source for all platforms)
        id: ui_hash
        run: |
          HASH=$(find taminator/taminator/web -type f | sort | xargs sha256sum | sha256sum | awk '{print $1}')
          echo "ui_hash=$HASH" >> $GITHUB_OUTPUT
          echo "UI source hash (Linux/Mac/Windows package the same): $HASH"
      - name: Release Summary
        run: |
          echo "✅ Release created successfully!"
          echo "🔗 https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}"
          echo ""
          echo "📦 Artifacts:"
          find artifacts/ -type f -exec basename {} \;
          echo ""
          echo "🖼 UI content hash (all platforms): ${{ steps.ui_hash.outputs.ui_hash }}"
