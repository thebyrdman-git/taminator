---
name: Electron Build & Release

on:
  push:
    tags:
      - 'v*.*.*'  # Triggers on version tags like v1.9.5
  workflow_dispatch:  # Manual trigger for testing

permissions:
  contents: write  # Required for creating releases

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.runner }}
    
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux builds (taminator/taminator/gui bundles web with HashiCorp Vault on Settings)
          - os: Linux
            runner: ubuntu-latest
            build_target: linux
            artifact_pattern: 'taminator/taminator/gui/dist/*.AppImage'
          
          # Windows builds
          - os: Windows
            runner: windows-latest
            build_target: win
            artifact_pattern: 'taminator/taminator/gui/dist/*.exe'
          
          # macOS builds (Universal - Intel + Apple Silicon)
          - os: macOS
            runner: macos-latest
            build_target: mac
            artifact_pattern: 'taminator/taminator/gui/dist/*.dmg'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Ensure build icon for inner gui
        shell: bash
        run: |
          if [ ! -f taminator/gui/build/icon.png ]; then
            echo "::error::Missing taminator/gui/build/icon.png — add a 512x512 PNG and commit it."
            exit 1
          fi
          mkdir -p taminator/taminator/gui/build
          cp taminator/gui/build/icon.png taminator/taminator/gui/build/icon.png
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: taminator/taminator/gui/package-lock.json
      
      - name: Cache Electron and electron-builder
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
            taminator/taminator/gui/node_modules/electron
          key: electron-${{ runner.os }}-${{ hashFiles('taminator/taminator/gui/package-lock.json') }}
          restore-keys: |
            electron-${{ runner.os }}-
      
      - name: Install Node dependencies
        working-directory: taminator/taminator/gui
        env:
          npm_config_fetch_retries: 5
          npm_config_fetch_timeout: 600000
          npm_config_fetch_retry_mintimeout: 60000
          ELECTRON_GET_USE_PROXY: 'false'
        run: |
          for i in 1 2 3; do
            echo "Attempt $i of 3..."
            if npm ci; then
              echo "npm ci succeeded"
              exit 0
            fi
            echo "Attempt $i failed."
            if [ "$i" -lt 3 ]; then
              echo "Retrying in 30s..."
              sleep 30
            fi
          done
          echo "::error::npm ci failed after 3 attempts"
          echo "Last npm log:"
          ls -la ~/.npm/_logs 2>/dev/null | tail -3
          cat ~/.npm/_logs/*-debug*.log 2>/dev/null | tail -80 || true
          exit 1
      
      - name: Build Electron app (${{ matrix.os }})
        working-directory: taminator/taminator/gui
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signing: set CSC_LINK, CSC_KEY_PASSWORD, APPLEID, APPLEIDPASS in repo secrets to enable; omit to build unsigned
        run: |
          npx electron-builder --${{ matrix.build_target }} --publish never
      
      - name: List dist directory (debug)
        working-directory: taminator/taminator/gui
        shell: bash
        run: ls -la dist/
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: taminator-${{ matrix.os }}-${{ github.ref_name }}
          path: ${{ matrix.artifact_pattern }}
          retention-days: 30

  build-linux-arm64:
    name: Build Linux ARM64 (AppImage)
    runs-on: ubuntu-24.04
    continue-on-error: true  # Do not block release if ARM64 build fails
    steps:
      - uses: actions/checkout@v4
      - name: Ensure build icon for inner gui
        run: |
          if [ ! -f taminator/gui/build/icon.png ]; then
            echo "::error::Missing taminator/gui/build/icon.png — add a 512x512 PNG and commit it."
            exit 1
          fi
          mkdir -p taminator/taminator/gui/build
          cp taminator/gui/build/icon.png taminator/taminator/gui/build/icon.png
      - uses: uraimo/run-on-arch-action@v3
        name: Build AppImage on aarch64
        id: build
        with:
          arch: aarch64
          distro: ubuntu20.04
          # ubuntu20.04: NodeSource setup_20.x works; 24.04 install was exiting 100
          setup: |
            mkdir -p "${PWD}/arm64-artifacts"
          dockerRunArgs: |
            --volume "${PWD}:/workspace"
            --volume "${PWD}/arm64-artifacts:/artifacts"
          install: |
            apt-get update -qq
            apt-get install -qq -y curl ca-certificates
            curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
            apt-get install -qq -y nodejs
            apt-get install -qq -y libgtk-3-0 libnotify4 libnss3 libxss1 libasound2 libxtst6 libgbm1
          run: |
            set -e
            cd /workspace/taminator/taminator/gui
            npm config set fetch-retries 5
            npm config set fetch-timeout 300000
            npm config set fetch-retry-mintimeout 20000
            npm ci
            npx electron-builder --linux AppImage --publish never
            cp -v dist/*.AppImage /artifacts/ 2>/dev/null || true
            ls -la /artifacts/
      - name: Upload Linux ARM64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: taminator-Linux-arm64-${{ github.ref_name }}
          path: arm64-artifacts/*.AppImage
          retention-days: 30
  
  release:
    name: Create Release
    needs: [build, build-linux-arm64]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
      
      - name: List artifacts (debug)
        run: |
          echo "Artifacts downloaded:"
          find artifacts/ -type f
      
      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"
      
      - name: Read release notes
        id: release_notes
        run: |
          if [ -f "v${{ steps.version.outputs.version }}-release-notes.md" ]; then
            echo "notes_file=v${{ steps.version.outputs.version }}-release-notes.md" >> $GITHUB_OUTPUT
          else
            echo "notes_file=" >> $GITHUB_OUTPUT
          fi
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: Taminator v${{ steps.version.outputs.version }}
          body_path: ${{ steps.release_notes.outputs.notes_file }}
          draft: false
          prerelease: false
          files: |
            artifacts/**/*.AppImage
            artifacts/**/*.exe
            artifacts/**/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Release Summary
        run: |
          echo "✅ Release created successfully!"
          echo "🔗 https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}"
          echo ""
          echo "📦 Artifacts:"
          find artifacts/ -type f -exec basename {} \;
