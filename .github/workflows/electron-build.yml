---
name: Electron Build & Release

on:
  push:
    tags:
      - 'v*.*.*'  # Triggers on version tags like v1.9.5
  workflow_dispatch:  # Manual trigger for testing

permissions:
  contents: write  # Required for creating releases

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.runner }}
    
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux builds
          - os: Linux
            runner: ubuntu-latest
            build_target: linux
            artifact_pattern: 'taminator/gui/dist/*.AppImage'
          
          # Windows builds
          - os: Windows
            runner: windows-latest
            build_target: win
            artifact_pattern: 'taminator/gui/dist/*.exe'
          
          # macOS builds (Universal - Intel + Apple Silicon)
          - os: macOS
            runner: macos-latest
            build_target: mac
            artifact_pattern: 'taminator/gui/dist/*.dmg'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify build icon exists
        shell: bash
        run: |
          if [ ! -f taminator/gui/build/icon.png ]; then
            echo "::error::Missing taminator/gui/build/icon.png — add a 512x512 PNG and commit it."
            exit 1
          fi
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Node dependencies
        working-directory: taminator/gui
        run: npm ci
      
      - name: Build Electron app (${{ matrix.os }})
        working-directory: taminator/gui
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signing: set CSC_LINK, CSC_KEY_PASSWORD, APPLEID, APPLEIDPASS in repo secrets to enable; omit to build unsigned
        run: |
          npx electron-builder --${{ matrix.build_target }} --publish never
      
      - name: List dist directory (debug)
        working-directory: taminator/gui
        shell: bash
        run: ls -la dist/
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: taminator-${{ matrix.os }}-${{ github.ref_name }}
          path: ${{ matrix.artifact_pattern }}
          retention-days: 30

  build-linux-arm64:
    name: Build Linux ARM64 (AppImage)
    runs-on: ubuntu-24.04
    continue-on-error: true  # Do not block release if ARM64 build fails
    steps:
      - uses: actions/checkout@v4
      - name: Verify build icon exists
        run: |
          if [ ! -f taminator/gui/build/icon.png ]; then
            echo "::error::Missing taminator/gui/build/icon.png — add a 512x512 PNG and commit it."
            exit 1
          fi
      - uses: uraimo/run-on-arch-action@v3
        name: Build AppImage on aarch64
        id: build
        with:
          arch: aarch64
          distro: ubuntu24.04
          # No githubToken: avoid cache "manifest unknown" on first run; install runs from scratch
          setup: |
            mkdir -p "${PWD}/arm64-artifacts"
          dockerRunArgs: |
            --volume "${PWD}:/workspace"
            --volume "${PWD}/arm64-artifacts:/artifacts"
          install: |
            apt-get update -qq
            apt-get install -qq -y curl ca-certificates
            curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
            apt-get install -qq -y nodejs
            apt-get install -qq -y libgtk-3-0 libnotify4 libnss3 libxss1 libasound2 libxtst6 libgbm1
          run: |
            set -e
            cd /workspace/taminator/gui
            npm ci
            npx electron-builder --linux --publish never
            cp -v dist/*.AppImage /artifacts/ 2>/dev/null || true
            ls -la /artifacts/
      - name: Upload Linux ARM64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: taminator-Linux-arm64-${{ github.ref_name }}
          path: arm64-artifacts/*.AppImage
          retention-days: 30
  
  release:
    name: Create Release
    needs: [build, build-linux-arm64]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
      
      - name: List artifacts (debug)
        run: |
          echo "Artifacts downloaded:"
          find artifacts/ -type f
      
      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"
      
      - name: Read release notes
        id: release_notes
        run: |
          if [ -f "v${{ steps.version.outputs.version }}-release-notes.md" ]; then
            echo "notes_file=v${{ steps.version.outputs.version }}-release-notes.md" >> $GITHUB_OUTPUT
          else
            echo "notes_file=" >> $GITHUB_OUTPUT
          fi
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: Taminator v${{ steps.version.outputs.version }}
          body_path: ${{ steps.release_notes.outputs.notes_file }}
          draft: false
          prerelease: false
          files: |
            artifacts/**/*.AppImage
            artifacts/**/*.exe
            artifacts/**/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Release Summary
        run: |
          echo "✅ Release created successfully!"
          echo "🔗 https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}"
          echo ""
          echo "📦 Artifacts:"
          find artifacts/ -type f -exec basename {} \;
