---
# Build Linux packages only (CI) — for builds that cannot be built locally (e.g. on a Mac).
# Run from Actions tab → "Build Linux (CI)" → Run workflow.
#
# Uses GitHub repo layout: taminator/gui/ (no nested taminator/taminator/).
# Builds: Linux x64 (AppImage) + Linux ARM64 (AppImage) via npm ci + electron-builder.

name: Build Linux (CI)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate version and prerequisites
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.pkg_version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Record build source (ref and commit)
        run: |
          echo "Build ref: ${{ github.ref }}"
          echo "Build SHA: ${{ github.sha }}"
          git log -1 --oneline
      - name: Check build icon exists
        run: |
          if [ ! -f taminator/gui/build/icon.png ]; then
            echo "::error::Missing taminator/gui/build/icon.png"
            exit 1
          fi
      - name: Read version from package.json
        id: pkg_version
        run: |
          V=$(jq -r '.version' taminator/gui/package.json)
          echo "version=$V" >> $GITHUB_OUTPUT
          echo "Package version: $V"

  build-linux-x64:
    name: Build Linux (AppImage x64)
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build from commit
        run: echo "Building Linux x64 from ${{ github.sha }}"; git log -1 --oneline
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: taminator/gui/package-lock.json
      - name: Install dependencies and build
        working-directory: taminator/gui
        env:
          npm_config_fetch_retries: 5
          npm_config_fetch_timeout: 300000
        run: |
          npm ci
          npx electron-builder --linux AppImage --publish never
      - name: List built artifacts
        working-directory: taminator/gui/dist
        run: ls -la *.AppImage 2>/dev/null || true
      - name: Upload Linux AppImage (x64)
        uses: actions/upload-artifact@v4
        with:
          name: taminator-${{ needs.validate.outputs.version }}-linux-x64
          path: taminator/gui/dist/*.AppImage
          retention-days: 30

  build-linux-arm64:
    name: Build Linux ARM64 (AppImage)
    needs: validate
    runs-on: ubuntu-24.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Build from commit
        run: echo "Building Linux ARM64 from ${{ github.sha }}"; git log -1 --oneline
      - name: Ensure build icon exists
        run: |
          [ -f taminator/gui/build/icon.png ] || { echo "::error::Missing taminator/gui/build/icon.png"; exit 1; }
      - uses: uraimo/run-on-arch-action@v3
        with:
          arch: aarch64
          distro: ubuntu20.04
          setup: mkdir -p "${PWD}/arm64-artifacts"
          dockerRunArgs: |
            --volume "${PWD}:/workspace"
            --volume "${PWD}/arm64-artifacts:/artifacts"
          install: |
            apt-get update -qq && apt-get install -qq -y curl ca-certificates
            curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
            apt-get install -qq -y nodejs
            apt-get install -qq -y libgtk-3-0 libnotify4 libnss3 libxss1 libasound2 libxtst6 libgbm1
          run: |
            set -e
            cd /workspace/taminator/gui
            npm config set fetch-retries 5
            npm config set fetch-timeout 300000
            npm ci
            npx electron-builder --linux AppImage --publish never
            cp -v dist/*.AppImage /artifacts/ 2>/dev/null || true
            ls -la /artifacts/
      - name: List built Linux ARM64 artifacts
        run: ls -la arm64-artifacts/
      - name: Upload Linux ARM64 AppImage
        uses: actions/upload-artifact@v4
        with:
          name: taminator-${{ needs.validate.outputs.version }}-linux-arm64
          path: arm64-artifacts/*.AppImage
          retention-days: 30
