<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Maintenance – TAMINATOR</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f2f2f2;
      color: #1f1f1f;
      padding: 1rem;
      text-align: center;
    }
    .card {
      max-width: 420px;
      padding: 2rem;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    h1 { font-size: 1.25rem; margin: 0 0 0.5rem; color: #1f1f1f; }
    p { margin: 0 0 1rem; color: #707070; font-size: 0.95rem; line-height: 1.5; }
    a { color: #ee0000; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Site under maintenance</h1>
    <p>This site is temporarily unavailable while we update content. Please check back later.</p>
  </div>
</body>
</html>
